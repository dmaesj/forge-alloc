name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ----------------------------------------------------------------
  # Stable: build / test / clippy / fmt across the workspace.
  # ----------------------------------------------------------------
  stable:
    name: stable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check (default features)
        run: cargo check --workspace --all-targets

      - name: cargo check (all features)
        run: cargo check --workspace --all-targets --all-features

      - name: cargo test (default features)
        run: cargo test --workspace

      - name: cargo test (all features)
        run: cargo test --workspace --all-features

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo doc (no broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps

  # ----------------------------------------------------------------
  # no_std surface check: both library crates must compile without
  # std. `--lib` only — the no_std contract covers library code; test
  # code runs under std. The `no_std_compile` integration test is the
  # runnable no_std smoke check.
  # ----------------------------------------------------------------
  no_std:
    name: no_std surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo check -p forge-alloc-core (no_std)
        run: cargo check -p forge-alloc-core --no-default-features --lib

      - name: cargo check -p forge-alloc (no_std)
        run: cargo check -p forge-alloc --no-default-features --lib

      # forge-containers is unconditionally `#![no_std]` (alloc only); it has no
      # `std` feature, so `--no-default-features` is a no-op but keeps the form
      # uniform with the other library crates above.
      - name: cargo check -p forge-containers (no_std)
        run: cargo check -p forge-containers --no-default-features --lib

      # forge-alloc-capi's `staticlib`/`cdylib` crate-types are FINAL artifacts
      # that demand their own #[panic_handler]/#[global_allocator], so a plain
      # `cargo check --lib` would fail. Override the crate-type to `rlib` — the
      # only valid no_std surface, and exactly how a Rust no_std consumer
      # depends on it (Cargo emits just the rlib, deferring lang items).
      - name: cargo rustc -p forge-alloc-capi (no_std rlib)
        run: cargo rustc -p forge-alloc-capi --no-default-features --lib --crate-type rlib

  # ----------------------------------------------------------------
  # forge-alloc-capi C ABI: prove the C/C++ examples still compile and
  # run against the built shared library (the surface a C consumer
  # actually uses — symbol names, header parity, runtime behavior),
  # and that the self-contained embedded `staticlib-rt` static library
  # builds for a bare-metal target. This is the CI-enforced version of
  # what was previously only a manual MSVC check.
  # ----------------------------------------------------------------
  capi_ffi:
    name: capi C/C++ FFI + embedded staticlib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          key: capi-ffi

      - name: build desktop cdylib
        run: cargo build -p forge-alloc-capi --release

      - name: compile + run the C example against the shared library
        run: |
          cc crates/forge-alloc-capi/examples/bump_example.c \
            -I crates/forge-alloc-capi/include \
            -L target/release -lforge_alloc_capi \
            -o "$RUNNER_TEMP/bump_c"
          LD_LIBRARY_PATH=target/release "$RUNNER_TEMP/bump_c"

      - name: compile + run the C++ example against the shared library
        run: |
          c++ crates/forge-alloc-capi/examples/bump_example.cpp \
            -I crates/forge-alloc-capi/include \
            -L target/release -lforge_alloc_capi \
            -o "$RUNNER_TEMP/bump_cpp"
          LD_LIBRARY_PATH=target/release "$RUNNER_TEMP/bump_cpp"

      - name: build self-contained embedded staticlib (thumbv7em, no_std)
        run: |
          cargo build -p forge-alloc-capi --release \
            --no-default-features --features staticlib-rt \
            --target thumbv7em-none-eabihf

  # ----------------------------------------------------------------
  # Benchmark compile check. Verifies the `forge-bench` criterion
  # targets still COMPILE in the optimized `bench` profile. The
  # benches are NOT run here — criterion wall-clock numbers are
  # noise on shared CI runners; the instruction-counted regression
  # gate lives in the separate `codspeed.yml` workflow.
  #
  # Value over the `cargo check --all-targets` in the `stable` job:
  # `--no-run` does full optimized codegen + link, catching post-
  # monomorphization / optimized-only errors and bench-harness API
  # bit-rot that a dev-profile `cargo check` can miss. `--all-features`
  # so the `siphasher`-gated composition cases are covered too.
  # ----------------------------------------------------------------
  bench_compile:
    name: bench compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-compile

      - name: cargo bench --no-run (all features)
        run: cargo bench --no-run -p forge-bench --all-features

  # ----------------------------------------------------------------
  # MIRI: validates unsafe blocks against the stricter abstract
  # machine. Runs on nightly only — MIRI is a nightly-only tool.
  # OS-syscall-dependent tests (mmap, madvise, mbind, …) are gated
  # `#[cfg_attr(miri, ignore)]` in-tree, so a default-feature run is
  # safe to launch directly.
  # ----------------------------------------------------------------
  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2

      - name: miri test forge-alloc-core
        # `+nightly` overrides the stable pin in rust-toolchain.toml;
        # miri is a nightly-only component.
        run: cargo +nightly miri test -p forge-alloc-core --all-features

      - name: miri test forge-alloc (curated batteries)
        # The lib's own unit tests are NOT run under miri — many exercise
        # real syscalls (mmap, getcpu) miri cannot model. Run the two
        # integration tests written to be miri-safe: the miri_targets
        # harness and the nrvo_defeat move-safety battery. Their mmap /
        # thread tests are gated `#[cfg_attr(miri, ignore)]`.
        run: cargo +nightly miri test -p forge-alloc --test miri_targets --test nrvo_defeat

      - name: miri test forge-containers
        # Unlike forge-alloc, forge-containers' own unit tests are miri-safe
        # (pure `alloc`, no mmap/syscalls), so run the lib tests directly —
        # they exercise the unsafe pointer/provenance paths in AlignedColBuffer.
        run: cargo +nightly miri test -p forge-containers

  # ----------------------------------------------------------------
  # Cross-compile smoke checks. `cargo check` (NOT test) against
  # non-host targets — verifies the code compiles for the target's
  # rustc but does not link or execute. Catches accidental
  # std-only API use in no_std-capable code, libc symbol mismatches
  # in MmapBacked across architectures, and similar portability
  # regressions.
  #
  #   - cross_compile_workspace: hosted-std targets (aarch64-linux,
  #     x86_64-musl). Full workspace lib check.
  #   - cross_compile_no_std: bare-metal + WASM (thumbv7em, wasm32).
  #     Library crates with --no-default-features.
  # ----------------------------------------------------------------
  cross_compile_workspace:
    name: cross-compile (workspace, ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      # `--workspace` (lib only, no --all-targets). Cross-compile is a
      # smoke check for library portability; the test/bench/example
      # surface pulls in dev-dependencies (proptest, criterion) that
      # don't all cross-compile cleanly. Lib-only is the right scope.
      - name: cargo check workspace (--target ${{ matrix.target }})
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: cargo check workspace (all features, --target ${{ matrix.target }})
        run: cargo check --workspace --all-features --target ${{ matrix.target }}

  cross_compile_no_std:
    name: cross-compile (no_std, ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabihf
          - wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      # Bare-metal / wasm portability matrix.
      #
      # Both library crates compile here: counter atomics use
      # `AtomicUsize` (not `AtomicU64`), so 32-bit-atomic-only targets
      # like `thumbv7em-none-eabihf` (Cortex-M4) and pre-atomics
      # `wasm32-unknown-unknown` work without `portable-atomic` shimming.
      - name: cargo check forge-alloc-core (--no-default-features)
        run: cargo check -p forge-alloc-core --no-default-features --target ${{ matrix.target }}
      - name: cargo check forge-alloc (--no-default-features)
        run: cargo check -p forge-alloc --no-default-features --target ${{ matrix.target }}
      # forge-containers is alloc-only no_std; it must compile on bare-metal /
      # wasm targets too. (`alloc` is available without a registered
      # `#[global_allocator]` for a lib-only check.)
      - name: cargo check forge-containers (--no-default-features)
        run: cargo check -p forge-containers --no-default-features --target ${{ matrix.target }}

  # ----------------------------------------------------------------
  # Loom: c11 memory-model permutation testing on the concurrent
  # surface (SharedBumpArena CAS, SlabOwner/SlabRemote close-flag
  # race, ExtendableSlab hint). Models live in
  # crates/forge-alloc/tests/loom_concurrency.rs gated `#![cfg(loom)]`.
  # ----------------------------------------------------------------
  loom:
    name: loom (concurrency models)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: --cfg loom
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # `--cfg loom` produces a distinct build artifact; isolate
          # from the regular cache to avoid spurious rebuilds.
          key: loom

      - name: loom test (loom_concurrency)
        run: cargo test -p forge-alloc --test loom_concurrency

  # ----------------------------------------------------------------
  # Kani: bounded model checking on a subset of unsafe code paths.
  # The kani-verifier action fails loudly if any `#[kani::proof]`
  # harness is broken. Advisory — does not gate the merge.
  # ----------------------------------------------------------------
  kani:
    name: kani (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1.1
        with:
          # `enable-default-checks` was removed in kani-github-action v1.1.
          # Default checks are still applied by kani itself; the action's
          # surface just no longer carries the toggle.
          args: -p forge-alloc

  # ----------------------------------------------------------------
  # MSRV: verify the declared `rust-version = "1.84"` promise for the
  # two PUBLISHED library crates. Lib-only on purpose — rust-version is
  # the contract for *depending on* the crate, not for building our own
  # dev-dependency-backed test/bench targets (proptest/criterion track a
  # newer toolchain of their own). The `incompatible_msrv` clippy lint
  # catches some violations on `stable`; this job catches the rest by
  # actually compiling on 1.84.
  # ----------------------------------------------------------------
  msrv:
    name: MSRV (rust 1.84)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.84.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: cargo check published crates (default features)
        run: cargo check -p forge-alloc -p forge-alloc-core --lib
      - name: cargo check published crates (all features)
        run: cargo check -p forge-alloc -p forge-alloc-core --lib --all-features

  # ----------------------------------------------------------------
  # Supply-chain gate: cargo-deny vets the dependency tree for known
  # RUSTSEC advisories, license-policy violations, and untrusted
  # sources (git / non-crates.io registries). Config lives in the
  # repo-root `deny.toml`. Run locally with `cargo deny check`.
  # ----------------------------------------------------------------
  cargo_deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
